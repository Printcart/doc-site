      tags:
        - "3D Preview"
      operationId: "deleteProduct3DProfile"
      summary: "Delete product 3D profile"
      description: "Disables 3D preview for the product (soft delete). Re-creating the profile later restores it with a bumped config_version."
      parameters:
        - in: "path"
          name: "productId"
