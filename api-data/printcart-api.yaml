      required:
        - product_id
        - side_id
      properties:
        product_id:
          type: "string"
          description: "Product ID (must have an enabled 3D profile)"
          example: "1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
        side_id:
          type: "string"
          description: "Side ID providing the print geometry"
          example: "2b3c4d5e-6f7a-8b9c-0d1e-2f3a4b5c6d7e"
        design_id:
          type: "string"
          nullable: true
          description: "Optional design whose preview image is used as artwork"
        artwork_url:
          type: "string"
          nullable: true
          description: "Optional artwork URL. Must be an https URL on the Printcart CDN."
          example: "https://dcisb67tbokpv.cloudfront.net/preview-design/abc/artwork.png"
        edge_style:
          type: "string"
          enum: ["wrap", "mirror", "blur", "solid_color"]
          description: "Overrides the profile's default edge style"
          example: "wrap"
        edge_color:
          type: "string"
          nullable: true
          description: "Hex color, used with edge_style solid_color"
          example: "#ffffff"
        output:
          type: "object"
          properties:
            format:
              type: "string"
              enum: ["webp", "png"]
              example: "webp"
            width:
              type: "integer"
              minimum: 100
              maximum: 1600
              example: 1200
            height:
              type: "integer"
              minimum: 100
              maximum: 1600
              example: 900
        reset:
          type: "boolean"
          description: "Force a re-render, bypassing the cached result"
          example: false
      xml:
        name: "EdgePreviewRequest"
    ThreeDPreviewResultResponse:
      type: "object"
      properties:
        data:
          type: "object"
          properties:
            status:
              type: "string"
              enum: ["ready", "failed"]
              example: "ready"
            name:
              type: "string"
              example: "a1b2c3.webp"
            url:
              type: "string"
              description: "CDN URL of the rendered preview image"
              example: "https://dcisb67tbokpv.cloudfront.net/3d-preview/store-uuid/a1b2c3.webp"
            cache_hit:
              type: "boolean"
              description: "True when the result was served from the render cache"
              example: false
            input_hash:
              type: "string"
              description: "Content hash identifying this render (cache key)"
              example: "9f2c1e...64-char sha256"
      xml:
        name: "ThreeDPreviewResultResponse"
    ThreeDModelData:
      type: "object"
      properties:
        id:
          type: "string"
          description: "3D model ID"
          example: "7c8d9e0f-1a2b-3c4d-5e6f-7a8b9c0d1e2f"
        name:
          type: "string"
          example: "Coffee Mug 350ml"
        file_name:
          type: "string"
          example: "coffee-mug.glb"
        file_extension:
          type: "string"
          example: "glb"
        file_size:
          type: "integer"
          description: "File size in bytes"
          example: 4194304
        source_url:
          type: "string"
          nullable: true
          description: "CDN URL of the source GLB file"
          example: "https://dcisb67tbokpv.cloudfront.net/images/store-uuid/coffee-mug.glb"
        status:
          type: "string"
          enum: ["uploaded", "queued", "validating", "active", "failed"]
          example: "active"
        validation_report:
          type: "object"
          nullable: true
          description: "Validator output (populated after validation)"
        validation_error:
          type: "string"
          nullable: true
          description: "Reason validation failed, if any"
        validator_version:
          type: "string"
          nullable: true
          example: "glb-core-v1"
        metadata:
          type: "object"
          nullable: true
        preview_image:
          type: "object"
          nullable: true
          description: "Rendered preview image of the model, if generated"
        validated_at:
          type: "string"
          nullable: true
          format: "date-time"
        created_at:
          type: "string"
          format: "date-time"
        updated_at:
          type: "string"
          format: "date-time"
      xml:
        name: "ThreeDModelData"
    ThreeDModelResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/ThreeDModelData"
      xml:
        name: "ThreeDModelResponse"
    ThreeDModelListResponse:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/components/schemas/ThreeDModelData"
        links:
          type: "object"
          description: "Cursor pagination links"
          properties:
            first:
              type: "string"
              nullable: true
            last:
              type: "string"
              nullable: true
            prev:
              type: "string"
              nullable: true
            next:
              type: "string"
              nullable: true
      xml:
        name: "ThreeDModelListResponse"
    ThreeDModelCreateRequest:
      type: "object"
      required:
        - name
        - source_image_id
      properties:
        name:
          type: "string"
          maxLength: 255
          example: "Coffee Mug 350ml"
        source_image_id:
          type: "string"
          format: "uuid"
          description: "UUID of the uploaded GLB image (must be a .glb under images/)"
          example: "3f2a1b0c-9d8e-7f6a-5b4c-3d2e1f0a9b8c"
        metadata:
          type: "object"
          nullable: true
          description: "Optional arbitrary metadata"
      xml:
        name: "ThreeDModelCreateRequest"
    ThreeDModelUpdateRequest:
      type: "object"
      properties:
        name:
          type: "string"
          maxLength: 255
          example: "Coffee Mug (updated)"
        metadata:
          type: "object"
          nullable: true
      xml:
        name: "ThreeDModelUpdateRequest"
    Side3DMappingData:
      type: "object"
      properties:
        id:
          type: "string"
          example: "5b4c3d2e-1f0a-9b8c-7d6e-5f4a3b2c1d0e"
        side_id:
          type: "string"
          example: "2b3c4d5e-6f7a-8b9c-0d1e-2f3a4b5c6d7e"
        model:
          $ref: "#/components/schemas/ThreeDModelData"
        surface_name:
          type: "string"
          nullable: true
          description: "Mesh/surface the artwork maps onto"
          example: "front_panel"
        material_name:
          type: "string"
          nullable: true
          example: "body"
        mapping:
          type: "object"
          nullable: true
          description: "UV / surface mapping configuration"
        transform:
          type: "object"
          nullable: true
          description: "Position / rotation / scale of the artwork on the surface"
        camera:
          type: "object"
          nullable: true
          description: "Default camera framing for the preview"
        enabled:
          type: "boolean"
          example: true
        config_version:
          type: "integer"
          example: 1
        created_at:
          type: "string"
          format: "date-time"
        updated_at:
          type: "string"
          format: "date-time"
      xml:
        name: "Side3DMappingData"
    Side3DMappingResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/Side3DMappingData"
      xml:
        name: "Side3DMappingResponse"
    Side3DMappingRequest:
      type: "object"
      required:
        - model_id
      properties:
        model_id:
          type: "string"
          format: "uuid"
          description: "UUID of an active 3D model to bind to this side"
          example: "7c8d9e0f-1a2b-3c4d-5e6f-7a8b9c0d1e2f"
        surface_name:
          type: "string"
          nullable: true
          maxLength: 255
          example: "front_panel"
        material_name:
          type: "string"
          nullable: true
          maxLength: 255
          example: "body"
        mapping:
          type: "object"
          nullable: true
        transform:
          type: "object"
          nullable: true
        camera:
          type: "object"
          nullable: true
        enabled:
          type: "boolean"
          nullable: true
          example: true
      xml:
        name: "Side3DMappingRequest"
