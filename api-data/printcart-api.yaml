      security:
        - BasicAuth: []
  /3d/edge-preview:
    post:
      tags:
        - "3D Preview"
      operationId: "renderEdgePreview"
      summary: "Render a 3D edge preview"
      description: |
        Renders a 2D artwork into a procedural 3D edge preview image (canvas / wall-art style).
        Requires the product to have an enabled 3D profile and a Pro plan or higher.

        Artwork resolution order: `design_id` preview image → `artwork_url` (must be a Printcart CDN URL) → the side background image.
        Results are cached by content hash — identical requests return `cache_hit: true` without re-rendering. Send `reset: true` to force a re-render.
        Rate limited to 10 renders per minute per store.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EdgePreviewRequest"
        required: true
      responses:
        "200":
          description: "Rendered successfully (or served from cache)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDPreviewResultResponse"
        "400":
          description: "Invalid input, 3D preview disabled, invalid artwork URL, or plan upgrade required"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInput"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "429":
          description: "Too many render requests (rate limited)"
        "500":
          description: "Render failed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      security:
        - BasicAuth: []
        - UnAuthToken: []
  /designs/{designId}/generate/3d-preview:
    post:
      tags:
        - "3D Preview"
      operationId: "generateSavedDesign3DPreview"
      summary: "Generate 3D preview for a saved design"
      description: |
        Generates a 3D edge preview for an already-saved design. Print geometry is read from the
        design's `original_side` snapshot (captured when the design was saved), so later product
        edits never change the proof of an existing customer design.

        Requires the design's product to have an enabled 3D profile and a Pro plan or higher.
        Results are cached — send `reset: true` in the body to force a re-render.
        Rate limited to 10 renders per minute per store.
      parameters:
        - in: "path"
          name: "designId"
          description: "Design ID"
          required: true
          schema:
            type: "string"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reset:
                  type: boolean
                  description: "Force a re-render, bypassing the cached result"
                  example: false
      responses:
        "200":
          description: "Rendered successfully (or served from cache)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDPreviewResultResponse"
        "400":
          description: "Invalid input, 3D preview disabled, missing design snapshot, or plan upgrade required"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInput"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "429":
          description: "Too many render requests (rate limited)"
        "500":
          description: "Render failed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      security:
        - BasicAuth: []
  /3d-models:
    get:
      tags:
        - "3D Preview"
      operationId: "listThreeDModels"
      summary: "Get a list of 3D models"
      description: |
        Lists the store's uploaded 3D models (GLB assets). Cursor paginated.
      parameters:
        - in: "query"
          name: "limit"
          description: "Items per page (1–100, default 24)"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 100
            default: 24
        - in: "query"
          name: "status"
          description: "Filter by lifecycle status"
          required: false
          schema:
            type: "string"
            enum: ["uploaded", "queued", "validating", "active", "failed"]
        - in: "query"
          name: "search"
          description: "Filter by model name (substring match)"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "A list of 3D models"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDModelListResponse"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
      security:
        - BasicAuth: []
    post:
      tags:
        - "3D Preview"
      operationId: "createThreeDModel"
      summary: "Register a new 3D model"
      description: |
        Registers a previously uploaded GLB file (via the multipart upload flow) as a 3D model.
        The referenced image must be a `.glb` file under the `images/` prefix and no larger than 25MB.
        The model starts in `uploaded` status; call the validate endpoint to run async GLB validation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreeDModelCreateRequest"
      responses:
        "201":
          description: "3D model registered"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDModelResponse"
        "400":
          description: "Invalid file (not a GLB, wrong path, too large, or source missing)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInput"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Source image not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
      security:
        - BasicAuth: []
  /3d-models/{modelId}:
    get:
      tags:
        - "3D Preview"
      operationId: "getThreeDModel"
      summary: "Get 3D model details"
      parameters:
        - in: "path"
          name: "modelId"
          description: "3D model ID"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "3D model details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDModelResponse"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
      security:
        - BasicAuth: []
    put:
      tags:
        - "3D Preview"
      operationId: "updateThreeDModel"
      summary: "Update 3D model details"
      description: "Updates editable metadata (name, metadata). Does not change the uploaded file."
      parameters:
        - in: "path"
          name: "modelId"
          description: "3D model ID"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreeDModelUpdateRequest"
      responses:
        "200":
          description: "3D model updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDModelResponse"
        "400":
          description: "Invalid input"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInput"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
      security:
        - BasicAuth: []
    delete:
      tags:
        - "3D Preview"
      operationId: "deleteThreeDModel"
      summary: "Delete a 3D model"
      description: "Soft-deletes the model. Returns 409 if the model is still referenced by a profile or a side mapping."
      parameters:
        - in: "path"
          name: "modelId"
          description: "3D model ID"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Deleted"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "409":
          description: "Model is in use by a profile or side mapping"
      security:
        - BasicAuth: []
  /3d-models/{modelId}/validate:
    post:
      tags:
        - "3D Preview"
      operationId: "validateThreeDModel"
      summary: "Validate a 3D model"
      description: |
        Queues async validation of the model's GLB file (geometry, textures ≤ 4096px, no external
        dependencies). Returns `202` with the model in `queued` status while validation runs; on
        success the model becomes `active`. If the model is already `active`, returns `200` without
        re-queuing unless `reset: true` is sent. Rate limited to 10 requests per minute per store.
      parameters:
        - in: "path"
          name: "modelId"
          description: "3D model ID"
          required: true
          schema:
            type: "string"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: "object"
              properties:
                reset:
                  type: "boolean"
                  description: "Re-run validation even if the model is already active"
                  example: false
      responses:
        "200":
          description: "Model already validated (active)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDModelResponse"
        "202":
          description: "Validation queued"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeDModelResponse"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "429":
          description: "Too many validation requests (rate limited)"
        "503":
          description: "Validation could not be dispatched"
      security:
        - BasicAuth: []
  /sides/{sideId}/3d-mapping:
    get:
      tags:
        - "3D Preview"
      operationId: "getSide3DMapping"
      summary: "Get a side's 3D model mapping"
      description: "Returns the 3D model mapping bound to a product side, if any."
      parameters:
        - in: "path"
          name: "sideId"
          description: "Side ID"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "The side's 3D mapping"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Side3DMappingResponse"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "No mapping for this side"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
      security:
        - BasicAuth: []
    put:
      tags:
        - "3D Preview"
      operationId: "updateSide3DMapping"
      summary: "Create or update a side's 3D model mapping"
      description: |
        Binds an `active` 3D model to a product side and sets its surface/material mapping and
        transform. Creating or changing the mapping bumps its `config_version`.
      parameters:
        - in: "path"
          name: "sideId"
          description: "Side ID"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Side3DMappingRequest"
      responses:
        "200":
          description: "Mapping created or updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Side3DMappingResponse"
        "400":
          description: "Invalid input"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInput"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Side not found, or model not found / not active"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
      security:
        - BasicAuth: []
    delete:
      tags:
        - "3D Preview"
      operationId: "deleteSide3DMapping"
      summary: "Delete a side's 3D model mapping"
      parameters:
        - in: "path"
          name: "sideId"
          description: "Side ID"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Deleted"
        "401":
          description: "Unauthenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "No mapping for this side"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
      security:
        - BasicAuth: []
components:
  securitySchemes:
    BasicAuth:
      description: |
        - The client sends HTTP requests with the Authorization header that contains the word Basic word followed by a space and a base64-encoded string
      type: http
      schema: basic
    UnAuthToken:
      description: |
        - Some Printcart API endpoints don't need your username and password to authenticate. Those endpoints only interact with your public data so the code can be shared publicly.
        - To request to those endpoints, you only need to send <code>UnAuthToken</code> in the <code>X-PrintCart-Unauth-Token</code> header
      type: apiKey
      name: X-PrintCart-Unauth-Token
      in: header
  schemas:
    Account:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          description: Customer name
          example: admin
        email:
          type: string
          format: email
          description: The email address for the customer.
          example: "admin@example.com"
        password:
          type: string
          description: |
            - Require at least 8 characters
            - Require at least one number
            - Require at least one symbol
            - Require at least one uppercase and one lowercase letter
          example: Password1234@
      xml:
        name: Account
    AccountUpdate:
