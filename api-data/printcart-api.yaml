      operationId: "updateProduct3DProfile"
      summary: "Update product 3D profile"
      description: "Updates the 3D preview profile. Changing a render-affecting field (mode, edge style, edge depth, edge depth unit) bumps config_version so cached renders invalidate."
      parameters:
        - in: "path"
